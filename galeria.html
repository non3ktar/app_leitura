<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Galeria de Leitores</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        glass: {
                            100: 'rgba(255, 255, 255, 0.1)',
                            200: 'rgba(255, 255, 255, 0.05)',
                            300: 'rgba(0, 0, 0, 0.2)',
                            stroke: 'rgba(255, 255, 255, 0.15)',
                        },
                        neon: {
                            purple: '#b026ff',
                            blue: '#00f0ff',
                            gold: '#ffd700',
                            green: '#00ff88'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%': { filter: 'drop-shadow(0 0 10px rgba(176, 38, 255, 0.4))' },
                            '100%': { filter: 'drop-shadow(0 0 20px rgba(0, 240, 255, 0.8))' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(176, 38, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(255, 215, 0, 0.1), transparent 30%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--tw-colors-glass-200);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--tw-colors-glass-stroke);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.4s ease, border-color 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px 0 rgba(0, 240, 255, 0.2);
            border-color: rgba(0, 240, 255, 0.3);
            z-index: 10;
        }

        .glass-card:hover::before {
            left: 200%;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--tw-colors-neon-purple), var(--tw-colors-neon-blue));
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.4);
            margin: 0 auto;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #111;
            object-fit: cover;
        }

        .badge {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .badge-icon {
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.6));
        }

        /* Particles */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, var(--tw-colors-neon-blue) 25%, var(--tw-colors-neon-purple) 50%, transparent 100%);
            animation: spin 1s linear infinite;
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.4); }
    </style>
</head>
<body class="font-sans antialiased flex flex-col">

    <canvas id="particles"></canvas>

    <header class="glass-panel sticky top-0 z-50 border-b">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-neon-gold text-3xl animate-glow">auto_awesome</span>
                <h1 class="font-serif text-2xl md:text-3xl font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-neon-purple via-neon-blue to-neon-green">
                    Galeria de Leitores
                </h1>
            </div>
            <a href="index.html" class="flex items-center gap-2 text-sm text-gray-300 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full border border-white/10">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Voltar
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-12 flex flex-col items-center">
        
        <div class="text-center mb-16 max-w-2xl opacity-0 animate-slide-up">
            <h2 class="text-4xl md:text-6xl font-serif font-bold mb-4">Heróis da <span class="text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-neon-purple">Literatura</span></h2>
            <p class="text-gray-400 text-lg">Aqui celebramos as mentes brilhantes que viajam por mundos incríveis através das páginas.</p>
        </div>

        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="spinner mb-4"></div>
            <p class="text-neon-blue animate-pulse tracking-widest uppercase text-sm">Invocando os Heróis...</p>
        </div>

        <!-- Gallery Grid -->
        <div id="gallery-grid" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 pb-20 hidden">
            <!-- Cards serão inseridos aqui pelo JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 opacity-0 animate-slide-up">
            <span class="material-symbols-outlined text-6xl text-gray-600 mb-4">menu_book</span>
            <p class="text-xl text-gray-400">A galeria ainda está vazia. Seja o primeiro a ler!</p>
            <a href="index.html" class="mt-6 px-8 py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full transition-all text-white font-medium">Começar Leitura</a>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuração de Partículas de Fundo
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.3})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.005;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 100; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animateParticles();

        // Lógica de Supabase e Renderização
        const SUPABASE_URL = 'https://zmiyiuhevujyxjcukdpe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptaXlpdWhldnVqeXhqY3VrZHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjg0MjgsImV4cCI6MjA5NTMwNDQyOH0.fDzK49FEKXvCNs6X7RYv-qvj-eYJm7pVTbGZ5twvOR4';
        
        let supabaseClient;
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            alert("Erro de conexão com o banco de dados. Recarregue a página.");
        }

        const loader = document.getElementById('loader');
        const galleryGrid = document.getElementById('gallery-grid');
        const emptyState = document.getElementById('empty-state');

        function getLevelInfo(bookCount) {
            if (bookCount >= 10) return { title: "Mestre Supremo", icon: "diamond", color: "text-neon-blue", bg: "bg-neon-blue/20" };
            if (bookCount >= 5) return { title: "Viajante Especialista", icon: "rocket_launch", color: "text-neon-purple", bg: "bg-neon-purple/20" };
            if (bookCount >= 3) return { title: "Aventureiro Audaz", icon: "explore", color: "text-neon-green", bg: "bg-neon-green/20" };
            return { title: "Aprendiz Curioso", icon: "local_library", color: "text-neon-gold", bg: "bg-neon-gold/20" };
        }

        async function loadGallery() {
            try {
                // Fetch all sessions
                const { data: sessions, error } = await supabaseClient.from('sessions').select('student_name, book');
                
                if (error) throw error;

                if (!sessions || sessions.length === 0) {
                    loader.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                    return;
                }

                // Processar dados: agrupar por aluno e contar livros únicos
                const studentsMap = {};
                sessions.forEach(session => {
                    let name = session.student_name ? session.student_name.trim() : "Anônimo";
                    const book = session.book ? session.book.trim() : "Desconhecido";
                    
                    // Remove informações de turma entre parênteses no final do nome, ex: "Sérgio (7ºA)" -> "Sérgio"
                    name = name.replace(/\s*\(.*?\)$/, '').trim();
                    
                    // Normaliza nome para evitar duplicações de case
                    const normalizedName = name.toLowerCase().replace(/(?:^|\s)\S/g, a => a.toUpperCase());

                    if (!studentsMap[normalizedName]) {
                        studentsMap[normalizedName] = new Set();
                    }
                    studentsMap[normalizedName].add(book);
                });

                // Converter para array de objetos
                const studentsList = Object.keys(studentsMap).map(name => {
                    return {
                        name: name,
                        booksRead: studentsMap[name].size,
                        booksArray: Array.from(studentsMap[name])
                    };
                });

                // Ordenar por quem leu mais livros
                studentsList.sort((a, b) => b.booksRead - a.booksRead);

                loader.classList.add('hidden');
                galleryGrid.classList.remove('hidden');

                // Renderizar cards
                studentsList.forEach((student, index) => {
                    const staggerClass = `stagger-${(index % 4) + 1}`;
                    const seed = encodeURIComponent(student.name);
                    const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
                    
                    const level = getLevelInfo(student.booksRead);
                    
                    const card = document.createElement('div');
                    card.className = `glass-card p-6 flex flex-col items-center text-center opacity-0 animate-slide-up ${staggerClass}`;
                    
                    // Insígnia se leu pelo menos 1 livro
                    let badgeHTML = '';
                    if (student.booksRead >= 1) {
                        badgeHTML = `
                            <div class="absolute top-4 right-4 badge px-3 py-1 rounded-full flex items-center gap-1">
                                <span class="material-symbols-outlined text-neon-gold text-sm badge-icon">military_tech</span>
                                <span class="text-xs font-bold text-neon-gold">${student.booksRead} Livro${student.booksRead > 1 ? 's' : ''}</span>
                            </div>
                        `;
                    }

                    // Títulos dos livros em tooltip simples usando title
                    const booksTooltip = student.booksArray.join(' • ');

                    card.innerHTML = `
                        ${badgeHTML}
                        <div class="avatar-container mb-6 mt-4 animate-float">
                            <img src="${avatarUrl}" alt="${student.name}" class="avatar-img" />
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1 truncate w-full" title="${student.name}">${student.name}</h3>
                        
                        <div class="flex items-center gap-2 mb-4">
                            <span class="material-symbols-outlined ${level.color} text-lg">${level.icon}</span>
                            <span class="text-sm font-semibold tracking-wider uppercase ${level.color}">${level.title}</span>
                        </div>
                        
                        <div class="w-full bg-black/40 rounded-xl p-3 border border-white/5 cursor-help" title="Livros lidos: ${booksTooltip}">
                            <div class="text-gray-400 text-xs uppercase tracking-wider mb-1">Conhecimento Adquirido</div>
                            <div class="text-lg font-serif italic text-gray-200">
                                ${student.booksRead} ${student.booksRead === 1 ? 'Obra explorada' : 'Obras exploradas'}
                            </div>
                        </div>
                    `;
                    
                    galleryGrid.appendChild(card);
                });

            } catch (err) {
                console.error("Erro ao carregar galeria:", err);
                loader.innerHTML = `<p class="text-red-400">Erro ao carregar dados. Tente novamente mais tarde.</p>`;
            }
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', loadGallery);

    </script>
</body>
</html>
