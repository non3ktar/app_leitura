<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Galeria de Leitores</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#251a00", "outline": "#737973", "error": "#ba1a1a",
                        "surface-container-highest": "#e4e2de", "secondary-fixed": "#d8e6d8",
                        "surface-tint": "#4d6453", "surface-bright": "#fbf9f5",
                        "primary-container": "#1b3022", "on-background": "#1b1c1a",
                        "on-surface": "#1b1c1a", "surface-container": "#efeeea",
                        "on-tertiary-fixed-variant": "#5a4400", "surface-container-low": "#f5f3ef",
                        "background": "#fbf9f5", "primary-fixed": "#d0e9d4",
                        "on-tertiary-container": "#af8e3a", "on-surface-variant": "#434843",
                        "outline-variant": "#c3c8c1", "inverse-on-surface": "#f2f0ed",
                        "on-primary": "#ffffff", "tertiary": "#1f1500", "on-tertiary": "#ffffff",
                        "surface-dim": "#dbdad6", "inverse-primary": "#b4cdb8",
                        "on-secondary-fixed": "#131e16", "surface-variant": "#e4e2de",
                        "surface-container-lowest": "#ffffff", "surface-container-high": "#eae8e4",
                        "secondary": "#556257", "error-container": "#ffdad6",
                        "on-error": "#ffffff", "secondary-container": "#d5e3d5",
                        "on-secondary-fixed-variant": "#3d4a40", "on-secondary-container": "#59665b",
                        "secondary-fixed-dim": "#bccabd", "tertiary-container": "#382900",
                        "primary": "#061b0e", "tertiary-fixed": "#ffdf96", "surface": "#fbf9f5",
                        "inverse-surface": "#30312e", "tertiary-fixed-dim": "#e7c268",
                        "on-primary-container": "#819986", "primary-fixed-dim": "#b4cdb8",
                        "on-primary-fixed": "#0b2013", "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#364c3c", "on-secondary": "#ffffff"
                    },
                    spacing: {
                        "gutter": "24px", "sm": "12px", "xl": "80px", "xs": "4px",
                        "base": "8px", "md": "24px", "lg": "48px", "container-max": "1140px"
                    },
                    fontFamily: {
                        "headline-sm": ["Libre Caslon Text"], "body-lg": ["Inter"],
                        "display-lg-mobile": ["Libre Caslon Text"], "caption": ["Inter"],
                        "display-lg": ["Libre Caslon Text"], "headline-md": ["Libre Caslon Text"],
                        "label-md": ["Inter"], "title-lg": ["Inter"], "body-md": ["Inter"]
                    },
                    fontSize: {
                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: #d8e6d8;
            border: 2px solid #b4cdb8;
            margin: 0 auto;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #f5f3ef;
            object-fit: cover;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #d8e6d8;
            border-top: 4px solid #4d6453;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-body-md text-on-surface bg-background flex flex-col min-h-[100dvh] paper-texture">

    <header class="bg-surface border-b border-outline-variant w-full top-0 sticky z-50">
        <div class="flex justify-between items-center px-gutter py-sm max-w-container-max mx-auto h-16">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">menu_book</span>
                <h1 class="font-headline-sm text-headline-sm text-primary">Diário de Leitura</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors px-4 py-2 rounded-full flex items-center gap-2 font-label-md">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Voltar
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col max-w-container-max mx-auto w-full px-gutter pt-md pb-[120px] relative z-10">
        
        <div class="text-center mb-10 fade-in">
            <h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-4 flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-4xl text-tertiary">emoji_events</span>
                Galeria de Leitores
            </h2>
            <p class="font-body-lg text-body-lg text-on-surface-variant">Celebramos aqui as mentes brilhantes que viajam pelas páginas dos livros.</p>
        </div>

        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center py-20 fade-in">
            <div class="spinner mb-4"></div>
            <p class="font-label-md text-on-surface-variant uppercase tracking-widest">Carregando acervo...</p>
        </div>

        <!-- Gallery Grid -->
        <div id="gallery-grid" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden fade-in">
            <!-- Cards serão inseridos aqui -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 bg-surface-container-low rounded-[24px] border border-outline-variant fade-in">
            <span class="material-symbols-outlined text-6xl text-outline mb-4">menu_book</span>
            <p class="font-body-lg text-on-surface-variant mb-6">A galeria ainda está vazia. Seja o primeiro a ler!</p>
            <a href="index.html" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label-md hover:bg-primary-container hover:text-on-primary-container transition-all">Começar Leitura</a>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zmiyiuhevujyxjcukdpe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptaXlpdWhldnVqeXhqY3VrZHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjg0MjgsImV4cCI6MjA5NTMwNDQyOH0.fDzK49FEKXvCNs6X7RYv-qvj-eYJm7pVTbGZ5twvOR4';
        
        let supabaseClient;
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            alert("Erro de conexão com o banco de dados. Recarregue a página.");
        }

        const loader = document.getElementById('loader');
        const galleryGrid = document.getElementById('gallery-grid');
        const emptyState = document.getElementById('empty-state');

        function getLevelInfo(bookCount) {
            if (bookCount >= 10) return { title: "Mestre Supremo", icon: "diamond", color: "text-primary" };
            if (bookCount >= 5) return { title: "Viajante Especialista", icon: "rocket_launch", color: "text-tertiary" };
            if (bookCount >= 3) return { title: "Aventureiro Audaz", icon: "explore", color: "text-secondary" };
            return { title: "Aprendiz Curioso", icon: "local_library", color: "text-on-surface-variant" };
        }

        async function loadGallery() {
            try {
                const { data: sessions, error } = await supabaseClient.from('sessions').select('student_name, book');
                
                if (error) throw error;

                if (!sessions || sessions.length === 0) {
                    loader.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                    return;
                }

                const studentsMap = {};
                sessions.forEach(session => {
                    let name = session.student_name ? session.student_name.trim() : "Anônimo";
                    const book = session.book ? session.book.trim() : "Desconhecido";
                    
                    name = name.replace(/\s*\(.*?\)$/, '').trim();
                    const normalizedName = name.toLowerCase().replace(/(?:^|\s)\S/g, a => a.toUpperCase());

                    if (!studentsMap[normalizedName]) {
                        studentsMap[normalizedName] = new Set();
                    }
                    studentsMap[normalizedName].add(book);
                });

                const studentsList = Object.keys(studentsMap).map(name => {
                    return {
                        name: name,
                        booksRead: studentsMap[name].size,
                        booksArray: Array.from(studentsMap[name])
                    };
                });

                studentsList.sort((a, b) => b.booksRead - a.booksRead);

                loader.classList.add('hidden');
                galleryGrid.classList.remove('hidden');

                studentsList.forEach((student) => {
                    const seed = encodeURIComponent(student.name);
                    const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
                    
                    const level = getLevelInfo(student.booksRead);
                    
                    const card = document.createElement('div');
                    card.className = `bg-surface-container-low border border-outline-variant p-6 rounded-[24px] flex flex-col items-center text-center shadow-sm hover:shadow-md transition-shadow relative overflow-hidden`;
                    
                    let badgeHTML = '';
                    if (student.booksRead >= 1) {
                        badgeHTML = `
                            <div class="absolute top-4 right-4 bg-tertiary-fixed text-on-tertiary-fixed px-3 py-1 rounded-full flex items-center gap-1 border border-outline-variant shadow-sm">
                                <span class="material-symbols-outlined text-[14px]">military_tech</span>
                                <span class="font-label-md text-xs">${student.booksRead} Livro${student.booksRead > 1 ? 's' : ''}</span>
                            </div>
                        `;
                    }

                    const booksTooltip = student.booksArray.join(' • ');

                    card.innerHTML = `
                        ${badgeHTML}
                        <div class="avatar-container mb-4 mt-2">
                            <img src="${avatarUrl}" alt="${student.name}" class="avatar-img" />
                        </div>
                        <h3 class="font-headline-sm text-primary mb-1 truncate w-full" title="${student.name}">${student.name}</h3>
                        
                        <div class="flex items-center gap-1 mb-4">
                            <span class="material-symbols-outlined ${level.color} text-[18px]">${level.icon}</span>
                            <span class="font-label-md uppercase tracking-wider ${level.color} text-xs">${level.title}</span>
                        </div>
                        
                        <div class="w-full bg-surface border border-outline-variant rounded-xl p-3 cursor-help" title="Livros lidos: ${booksTooltip}">
                            <div class="font-label-md text-[10px] uppercase text-on-surface-variant mb-1">Conhecimento</div>
                            <div class="font-body-md text-on-surface font-semibold">
                                ${student.booksRead} ${student.booksRead === 1 ? 'Obra explorada' : 'Obras exploradas'}
                            </div>
                        </div>
                    `;
                    
                    galleryGrid.appendChild(card);
                });

            } catch (err) {
                console.error("Erro ao carregar galeria:", err);
                loader.innerHTML = `<p class="text-error font-body-md">Erro ao carregar dados. Tente novamente.</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
